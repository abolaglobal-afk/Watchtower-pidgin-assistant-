<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Watchtower Study</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .error-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            padding: 2rem;
        }

        .error-content {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            max-width: 500px;
        }

        .error-code {
            font-size: 4rem;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .error-content h1 {
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .error-content p {
            color: var(--gray);
            margin-bottom: 2rem;
            font-size: 1.05rem;
        }

        .error-content a {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .error-content a:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1>📖 Watchtower Pidgin Assistant</h1>
            </div>
        </header>

        <div class="error-container">
            <div class="error-content">
                <div class="error-code">⚠️</div>
                <h1>Oops!</h1>
                <p>{{ message }}</p>
                <a href="/">← Back to Studies</a>
            </div>
        </div>

        <footer class="footer">
            <p>Made with ❤️ for better understanding of Watchtower studies in Pidgin English</p>
        </footer>
    </div>
</body>
</html>
